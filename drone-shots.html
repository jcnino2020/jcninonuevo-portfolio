<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Drone Shots — Portfolio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          'bg':    '#000000',
          'surface': '#0f0f0f',
          'border': '#1f1f1f',
          'text-main': '#ffffff',
          'text-muted': '#a0a0a0',
          'accent': '#ffffff',
        },
        fontFamily: {
          sans: ['Helvetica Neue', 'Helvetica', 'Arial', 'sans-serif'],
        },
      },
    },
  }

  // Security scripts retained
  document.addEventListener('contextmenu', e => e.preventDefault());
  document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && ['s', 'u', 'a'].includes(e.key.toLowerCase())) e.preventDefault();
  });
</script>

<style>
  html { scroll-behavior: smooth; background: #000; }
  body { 
    background: #000; 
    color: #fff; 
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
    -webkit-font-smoothing: antialiased; 
    letter-spacing: -0.01em;
    line-height: 1.5;
  }

  ::selection { background: #fff; color: #000; }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #000; }
  ::-webkit-scrollbar-thumb { background: #222; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #333; }

  /* Nav */
  .nav-link { position: relative; }
  .nav-link::after {
    content:''; display:block; height:2px; background:#fff;
    transform:scaleX(0); transition:transform .3s cubic-bezier(0.22, 1, 0.36, 1);
    transform-origin:left;
  }
  .nav-link:hover::after, .nav-link.active::after { transform:scaleX(1); }

  /* Gallery */
  .gallery-item { transition: transform .4s ease, opacity .4s ease; }
  .gallery-item:hover { transform: scale(1.02); z-index: 10; }
  .gallery-item:hover img { filter: brightness(1); }
  .gallery-item img { filter: brightness(0.85); transition: filter .4s ease; }

  .gallery-grid { 
    columns: 3; 
    column-gap: 16px; 
  }
  @media(max-width:1024px){ .gallery-grid{ columns:2; } }
  @media(max-width:640px){ .gallery-grid{ columns:1; } }
  .gallery-grid .gallery-item { break-inside:avoid; margin-bottom:16px; display:block; }

  /* Lightbox */
  #lightbox { backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%); }

  /* Mobile menu */
  #mobile-menu { transition: max-height .4s ease, opacity .4s ease; }
  #mobile-menu.closed { max-height:0; opacity:0; overflow:hidden; pointer-events: none; }
  #mobile-menu.open   { max-height:500px; opacity:1; pointer-events: auto; }

  img {
    -webkit-user-drag: none;
    user-drag: none;
    pointer-events: none;
  }
  
  /* Sort Buttons */
  .sort-btn { 
    color: #555; 
    border: 1px solid #1f1f1f;
    transition: all .3s; 
  }
  .sort-btn:hover { color: #fff; border-color: #333; }
  .sort-btn.active { 
    color: #fff; 
    border-color: #fff; 
    background: rgba(255,255,255,0.05);
  }
</style>

</head>

      </div>

      <!-- Mobile Menu Button -->
      <button id="hamburger" class="md:hidden text-white p-2 rounded-lg hover:bg-white/10 transition-colors" aria-label="Menu">
        <svg id="ham-icon" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 6h16M4 12h16M4 18h16"/></svg>
        <svg id="close-icon" class="w-6 h-6 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>

    <!-- Mobile Menu -->
    <div id="mobile-menu" class="closed md:hidden">
      <div class="py-6 flex flex-col gap-5 border-t border-white/10">
        <a href="index.html" class="text-text-muted hover:text-white text-2xl font-bold transition-colors">Home</a>
        <a href="drone-shots.html" class="text-white text-2xl font-bold transition-colors">Drone Shots</a>
        <a href="framed-moments.html" class="text-text-muted hover:text-white text-2xl font-bold transition-colors">Framed Moments</a>
        <a href="school-events.html" class="text-text-muted hover:text-white text-2xl font-bold transition-colors">School Events</a>
        <a href="video-projects.html" class="text-text-muted hover:text-white text-2xl font-bold transition-colors">Video Projects</a>
        <div class="pt-4 border-t border-white/10">
          <a href="index.html#contact" class="block text-center btn-white w-full py-3 rounded-full text-lg font-bold bg-white text-black">Get in Touch</a>
        </div>
      </div>
    </div>
  </div>
</nav>

<script>
  (function(){
    const btn=document.getElementById('hamburger');
    const menu=document.getElementById('mobile-menu');
    const ham=document.getElementById('ham-icon');
    const x=document.getElementById('close-icon');
    let open=false;
    btn.addEventListener('click',()=>{
      open=!open;
      menu.className='md:hidden '+(open?'open':'closed');
      ham.classList.toggle('hidden',open); x.classList.toggle('hidden',!open);
    });
    menu.querySelectorAll('a').forEach(a=>a.addEventListener('click',()=>{
      open=false; menu.className='md:hidden closed';
      ham.classList.remove('hidden'); x.classList.add('hidden');
    }));
  })();
</script>

<!-- Main Content -->
<div class="pt-20">
  
  <!-- Hero Section -->
  <section class="py-24 border-b border-border">
    <div class="max-w-7xl mx-auto px-6 sm:px-10">
      <div class="flex flex-col md:flex-row items-start md:items-end justify-between gap-6">
        <div>
          <p class="text-text-muted text-xs font-bold uppercase tracking-[0.3em] mb-4">Category 01</p>
          <h1 class="text-4xl sm:text-5xl text-white font-bold">Drone Shots</h1>
          <p class="text-text-muted text-lg max-w-lg mt-4">Aerial perspectives. Landscapes, campuses, and skylines seen from above.</p>
        </div>
        
        <!-- Sorting Controls -->
        <div class="flex gap-3">
          <button onclick="setSort('newest')" id="sort-newest" class="sort-btn active px-5 py-2 rounded-full text-xs font-bold uppercase tracking-wider">
            Newest
          </button>
          <button onclick="setSort('oldest')" id="sort-oldest" class="sort-btn px-5 py-2 rounded-full text-xs font-bold uppercase tracking-wider">
            Oldest
          </button>
        </div>
      </div>
    </div>
  </section>

  <!-- Gallery Section -->
  <section class="py-24">
    <div class="max-w-7xl mx-auto px-6 sm:px-10">
      <div class="flex justify-end mb-8">
         <p class="text-text-muted text-xs font-bold" id="photo-count"></p>
      </div>
      <div class="gallery-grid" id="main-grid"></div>
    </div>
  </section>

</div>

<script>
  const BASE = "https://raw.githubusercontent.com/jcnino2020/jcninonuevo-portfolio/refs/heads/main/images/";

  // Full data list (Filtered for Drone category)
  const allPhotos = [
    {"id": 4,  "cat": "drone",  "title": "GH-02", "src": BASE+"GH-02.JPG", "w": 900, "h": 600},
    {"id": 5,  "cat": "drone",  "title": "GH-03", "src": BASE+"GH-03.JPG", "w": 900, "h": 600},
    {"id": 8,  "cat": "drone",  "title": "GH-06", "src": BASE+"GH-06.JPG", "w": 900, "h": 600},
    {"id": 14, "cat": "drone",  "title": "GH-13", "src": BASE+"GH-13.JPG", "w": 900, "h": 600},
    {"id": 17, "cat": "drone",  "title": "GH-16", "src": BASE+"GH-16.JPG", "w": 900, "h": 600},
    {"id": 20, "cat": "drone",  "title": "GH-19", "src": BASE+"GH-19.JPG", "w": 900, "h": 600},
    {"id": 23, "cat": "drone",  "title": "GH-22", "src": BASE+"GH-22.JPG", "w": 900, "h": 600},
    {"id": 26, "cat": "drone",  "title": "GH-27", "src": BASE+"GH-27.JPG", "w": 900, "h": 600},
    {"id": 29, "cat": "drone",  "title": "GH-30", "src": BASE+"GH-30.JPG", "w": 900, "h": 600},
    {"id": 32, "cat": "drone",  "title": "GH-33", "src": BASE+"GH-33.JPG", "w": 900, "h": 600},
    {"id": 35, "cat": "drone",  "title": "GH-36", "src": BASE+"GH-36.JPG", "w": 900, "h": 600},
    {"id": 38, "cat": "drone",  "title": "GH-40", "src": BASE+"GH-40.JPG", "w": 900, "h": 600}
  ];

  let sortOrder = 'newest';
  let currentGallery = [];

  function buildCard(p, gallery) {
    const wrap = document.createElement('div');
    wrap.className = 'gallery-item relative rounded-xl overflow-hidden cursor-pointer';
    wrap.innerHTML = `
      <img src="${p.src}" alt="${p.title}" loading="lazy"
        class="w-full h-auto block"
        onerror="this.src='https://placehold.co/900x600/111/333?text=Photo'" />
      <div class="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-transparent opacity-0 hover:opacity-100 transition-opacity duration-300 flex items-end p-5">
        <div class="flex justify-between items-end w-full">
          <p class="text-white font-bold text-sm">${p.title}</p>
          <svg class="w-5 h-5 text-white opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
          </svg>
        </div>
      </div>
    `;
    wrap.addEventListener('click', () => openLightbox(p, gallery));
    return wrap;
  }

  function setSort(order) {
    sortOrder = order;
    document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('sort-' + order).classList.add('active');
    renderGrid();
  }

  function renderGrid() {
    const grid = document.getElementById('main-grid');
    grid.innerHTML = '';
    
    // Filter is technically not needed here as data is pre-filtered, but kept for logic structure
    let filtered = allPhotos; 
    
    // Sort
    const sorted = [...filtered].sort((a, b) => sortOrder === 'newest' ? b.id - a.id : a.id - b.id);
    
    currentGallery = sorted;
    document.getElementById('photo-count').textContent = sorted.length + ' photos';
    sorted.forEach(p => grid.appendChild(buildCard(p, sorted)));
  }

  renderGrid();
</script>

<!-- Lightbox -->
<div id="lightbox" class="fixed inset-0 z-[9999] bg-black/98 hidden flex-col items-center justify-center p-4 md:p-8">
  <button onclick="closeLightbox()"
    class="absolute top-6 right-6 w-12 h-12 flex items-center justify-center text-white hover:bg-white/10 transition-colors rounded-full border border-white/10">
    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M6 18L18 6M6 6l12 12"/>
    </svg>
  </button>
  
  <button onclick="prevImage()"
    class="absolute left-4 top-1/2 -translate-y-1/2 w-14 h-14 flex items-center justify-center text-white hover:bg-white/10 transition-colors border border-white/10 rounded-full">
    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 19l-7-7 7-7"/>
    </svg>
  </button>
  
  <button onclick="nextImage()"
    class="absolute right-4 top-1/2 -translate-y-1/2 w-14 h-14 flex items-center justify-center text-white hover:bg-white/10 transition-colors border border-white/10 rounded-full">
    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5l7 7-7 7"/>
    </svg>
  </button>
  
  <img id="lightbox-img" src="" alt="" class="max-w-full max-h-[85vh] object-contain rounded-lg shadow-2xl" />
  <p id="lightbox-counter" class="absolute bottom-6 text-white text-xs font-bold tracking-widest"></p>
</div>

<script>
  let currentIndex=0;
  
  function openLightbox(photo, gallery){
    currentGallery=gallery; 
    currentIndex=gallery.indexOf(photo);
    syncLightbox();
    const lb=document.getElementById('lightbox');
    lb.classList.remove('hidden'); lb.classList.add('flex');
    document.body.style.overflow='hidden';
  }
  
  function syncLightbox(){
    const p = currentGallery[currentIndex];
    // Reconstruct src logic just in case, or use p.src
    const src = p.src; 
    document.getElementById('lightbox-img').src = src;
    document.getElementById('lightbox-img').alt = p.title;
    document.getElementById('lightbox-counter').textContent = (currentIndex+1) + ' / ' + currentGallery.length;
  }

  function closeLightbox(){
    document.getElementById('lightbox').classList.add('hidden');
    document.getElementById('lightbox').classList.remove('flex');
    document.body.style.overflow='';
  }
  
  function prevImage(){ currentIndex=(currentIndex-1+currentGallery.length)%currentGallery.length; syncLightbox(); }
  function nextImage(){ currentIndex=(currentIndex+1)%currentGallery.length; syncLightbox(); }
  
  document.addEventListener('keydown',e=>{
    if(e.key==='Escape') closeLightbox();
    if(e.key==='ArrowLeft') prevImage();
    if(e.key==='ArrowRight') nextImage();
  });
  
  document.getElementById('lightbox').addEventListener('click',e=>{
    if(e.target===document.getElementById('lightbox')) closeLightbox();
  });
</script>
